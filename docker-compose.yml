services:
  postgres:
    image: postgres:16
    container_name: uchicagofinance-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uchicagofinance
    ports:
      - "5433:5432"
    volumes:
      - uchicagofinance-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uchicagofinance"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  uchicagofinance-pg-data:
